<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tambaqui</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--background:hsl(240 10% 3.9%);--foreground:hsl(0 0% 98%);--card:hsl(240 10% 3.9%);--card-fg:hsl(0 0% 98%);--muted:hsl(240 3.7% 15.9%);--muted-fg:hsl(240 5% 64.9%);--border:hsl(240 3.7% 15.9%);--input:hsl(240 3.7% 15.9%);--primary:hsl(0 0% 98%);--primary-fg:hsl(240 5.9% 10%);--secondary:hsl(240 3.7% 15.9%);--secondary-fg:hsl(0 0% 98%);--destructive:hsl(0 62.8% 30.6%);--ring:hsl(240 4.9% 83.9%);--radius:0.5rem}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:var(--background);color:var(--foreground);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:24rem;box-shadow:0 1px 2px 0 rgb(0 0 0/.05)}
.card-header{text-align:center;margin-bottom:1.5rem}
.card-header h1{font-size:1.5rem;font-weight:600;letter-spacing:-.025em;display:flex;align-items:center;justify-content:center;gap:.5rem}
.card-header p{font-size:.875rem;color:var(--muted-fg);margin-top:.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.375rem}
.field input{width:100%;height:2.5rem;background:var(--background);border:1px solid var(--input);border-radius:calc(var(--radius) - 2px);padding:0 .75rem;color:var(--foreground);font-size:.875rem;outline:none;transition:box-shadow .15s}
.field input:focus{box-shadow:0 0 0 2px var(--background),0 0 0 4px var(--ring)}
.btn{width:100%;height:2.5rem;background:var(--primary);color:var(--primary-fg);border:none;border-radius:calc(var(--radius) - 2px);font-size:.875rem;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:.5rem}
.btn:hover{opacity:.9}
.err{color:hsl(0 84.2% 60.2%);font-size:.875rem;text-align:center;margin-top:.75rem;display:none}
</style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1><i data-lucide="fish" style="width:24px;height:24px"></i> Tambaqui</h1>
        <p>Entre com seu usuário</p>
    </div>
    <div class="field"><label>Usuário</label><input id="user" autofocus onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()"></div>
    <div class="field"><label>Senha</label><input id="pass" type="password" onkeydown="if(event.key==='Enter')login()"></div>
    <button class="btn" onclick="login()">Entrar</button>
    <div class="err" id="err"></div>
</div>
<script>
lucide.createIcons();
async function login(){
    const u=document.getElementById('user').value.trim(),p=document.getElementById('pass').value;
    if(!u||!p)return;
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,senha:p})});
    const d=await r.json();
    if(d.ok)window.location.href='/';
    else{const e=document.getElementById('err');e.textContent=d.erro||'Erro';e.style.display='block'}
}
</script>
</body></html>
