name: Build Docker Image

on:
  push:
    branches: [main]
    paths: [app.py, Dockerfile, Dockerfile.cuda, requirements.txt, "static/**"]
  workflow_dispatch: {}   # permite disparar a build manualmente (Actions > Run workflow)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile        # CPU
            tag: latest
          - dockerfile: Dockerfile.cuda   # GPU NVIDIA (Unraid: tag :cuda + --gpus all)
            tag: cuda

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.tag }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
          platforms: linux/amd64
