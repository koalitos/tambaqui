version: "3.8"

services:
  tambaqui:
    build: .
    container_name: tambaqui
    ports:
      - "8000:8000"
    volumes:
      - ./modelos:/app/modelos
      - ./dados:/app/dados
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TAMBAQUI_ADMIN_USER=admin
      - TAMBAQUI_ADMIN_PASS=tambaqui
