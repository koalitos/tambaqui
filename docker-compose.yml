version: "3.8"

services:
  tambaqui:
    image: ghcr.io/koalitos/tambaqui:latest   # CPU. Para GPU NVIDIA: docker compose -f docker-compose.gpu.yml up -d
    # Ou build local: build: .
    container_name: tambaqui
    ports:
      - "8000:8000"
    volumes:
      - ./modelos:/app/modelos
      - ./dados:/app/dados
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TAMBAQUI_ADMIN_USER=admin
      - TAMBAQUI_ADMIN_PASS=tambaqui
